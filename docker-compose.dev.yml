version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: freelancehub-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev_password
      MYSQL_DATABASE: freelancehub_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - freelancehub-dev-network

  redis:
    image: redis:7-alpine
    container_name: freelancehub-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - freelancehub-dev-network
    command: redis-server --appendonly yes

  adminer:
    image: adminer:latest
    container_name: freelancehub-adminer-dev
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - freelancehub-dev-network
    depends_on:
      - mysql

networks:
  freelancehub-dev-network:
    driver: bridge

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
